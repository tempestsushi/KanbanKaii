<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanbanKaii — Offline</title>
    <style>
      :root {
        color: #0f172a;
        background: #f8f7ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(124, 58, 237, 0.18), transparent 32rem),
          radial-gradient(circle at 82% 78%, rgba(99, 102, 241, 0.16), transparent 30rem),
          #f8f7ff;
      }

      main {
        width: min(88vw, 28rem);
        border: 1px solid rgba(124, 58, 237, 0.16);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 1.5rem 4rem rgba(79, 70, 229, 0.14);
        padding: 2rem;
      }

      .icon {
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        color: white;
        font-weight: 800;
      }

      h1 {
        margin: 1.25rem 0 0.5rem;
        font-size: clamp(1.8rem, 8vw, 2.75rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">K</div>
      <h1>You are offline.</h1>
      <p>KanbanKaii is installed, but tickets and Slack updates need the backend connection. Reconnect and refresh when you are back online.</p>
    </main>
  </body>
</html>
